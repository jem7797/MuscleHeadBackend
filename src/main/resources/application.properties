# Supabase Database Configuration
# Project: db.xfffigdnmqvcjnxqkwdq.supabase.co
# Set SUPABASE_DB_PASSWORD in your environment or .env file
#
# Connection pooling (port 6543) is also available for production:
# jdbc:postgresql://db.xfffigdnmqvcjnxqkwdq.supabase.co:6543/postgres?sslmode=require

server.port=8082

# Supabase PostgreSQL (pooler connection, port 6543)
spring.datasource.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Local PostgreSQL for development (uncomment to use local instead)
# spring.datasource.url=jdbc:postgresql://localhost:5432/musclehead
# spring.datasource.username=jordanmolina21
# spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

#Makes enums case insensitive 
spring.jackson.mapper.accept-case-insensitive-enums=true


# AWS Cognito Configuration
aws.cognito.userPoolId=us-east-1_0BDYAb7NO
aws.cognito.region=us-east-1
aws.cognito.appClientId=3jam1bhk1s2j1nfa3018n7ogdn
supabase.jwt.secret=${SUPABASE_SECRET_KEY:REPLACE_ME}

# AWS S3 Configuration
# Credentials: use AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY env vars, or ~/.aws/credentials
# Main bucket: used for downloads and (by default) uploads. Upload and download must use the same bucket.
aws.s3.bucket=musclehead-user-pfps
# Upload bucket: defaults to aws.s3.bucket so uploads are readable. Set to pending bucket only if you have a copy workflow.
aws.s3.upload-bucket=${aws.s3.bucket}

aws.s3.region=us-east-1
aws.s3.presigned-url-expiry-minutes=15

# Upstash Redis (cache) - UPSTASH_REDIS_REST_TOKEN loaded from .env
upstash.redis.url=${UPSTASH_REDIS_REST_URL:https://modest-snapper-60715.upstash.io}
upstash.redis.uri=rediss://default:${UPSTASH_REDIS_REST_TOKEN}@modest-snapper-60715.upstash.io:6379

# Post cache TTL in seconds (default 1 hour)
post.cache.ttl-seconds=3600

# User profile cache TTL in seconds (1 hour)
user.cache.ttl-seconds=3600

# Feed cache TTL in seconds (1 hour)
feed.cache.ttl-seconds=3600

# Following list cache TTL in seconds (15 minutes)
following.cache.ttl-seconds=900

# Mutual followers check cache TTL in seconds (15 minutes)
mutual-followers.cache.ttl-seconds=900

# Followers list, following list, isFollowing check cache TTL in seconds (15 minutes)
follow-lists.cache.ttl-seconds=900

# Notification list cache TTL in seconds (90 seconds)
notification.cache.ttl-seconds=90

# Worked muscles cache TTL in seconds (5 minutes)
worked-muscles.cache.ttl-seconds=300

# Per-muscle expiry in hours (refreshed on each workout)
worked-muscles.expiry-hours=48

# Daily cleanup of expired rows (cron: 3am daily)
worked-muscles.cleanup.cron=0 0 3 * * *

